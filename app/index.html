<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AACS Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./RKN.png">
    <meta author="INSERT">
    <meta coauthor="FeranZello">
</head>
<body>
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="../video/AACS.mp4" type="video/mp4">
        <source src="../video/AACS.webm" type="video/webm">
    </video>
    
    <audio id="static" src="../audio/Static.mp3" autoplay loop playsinline></audio>
    
    <div id="screamer-container" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 9999;">
    <video id="screamer-video" style="width: 100%; height: 100%; object-fit: cover;">
        <source src="../video/intr1.mp4" type="video/mp4">
    </video>
    </div>
    
    <div id="terminal">
        <div id="terminal-content">
            <div id="history"></div>

            <div class="input-line">
                <span class="prompt">AACS:\></span>
                <span id="typer-text"></span> <input type="text" id="cmd-input" autofocus spellcheck="false">
                <div id="cursor"></div>
            </div>
        </div>
    </div>

    <script type="module" src="../modules/date.js"></script>
    <script type="module" src="../modules/Download.js"></script>
    <script type="module" src="../modules/Readlog.js"></script>
    <script type="module" src="./script.js"></script>
    <script type="module" src="../modules/files.js"></script>
</body>
</html>
