<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AACS Terminal</title>
    <link rel="stylesheet" href="./app/style.css">
    <link rel="icon" href="./app/RKN.png">
    <meta author="INSERT">
    <meta coauthor="FeranZello">
</head>
<body>




    //Zipkey: fjasuS473ASSDfj21kgi==21fka







    <div id="hacking-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; color:#0f0; font-family:monospace; z-index:10000; overflow:hidden; padding:20px; font-size:12px; line-height:1;">
        <div id="hacking-content"></div>
    </div>

    <video class="bg-video" preload="auto" autoplay muted loop playsinline>
        <source src="video/AACS.mp4" type="video/mp4">
        <source src="video/AACS.webm" type="video/webm">
    </video>
    
    <audio id="static" src="audio/Static.mp3" autoplay loop playsinline></audio>
    
    <div id="screamer-container" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 9999;">
    <video id="screamer-video" preload="auto" style="width: 100%; height: 100%; object-fit: cover;">
        <source src="video/ryka_Rkoen.mp4" type="video/mp4">
    </video>
    </div>
    <!-- Контейнер для 3D карты внутри "окна" -->
    <div id="netmap-overlay" class="hidden">
        <div class="netmap-window">
            <div class="netmap-header">
                <span class="netmap-title">AACS_GEO_SCANNER v1.0</span>
                <span class="netmap-hint">PRESS [TAB] TO EXIT</span>
            </div>
            <div id="antenna-viewport"></div> <!-- Перемещаем вьюпорт сюда -->
        </div>
    </div>
    
    <div class="terminal-screen">
    <div class="scanlines"></div>
    <div class="vignette"></div>
    
    <div id="terminal">
        <div id="terminal-content">
            <div id="history"></div>
            <div class="input-line">
                <span class="prompt">AACS:\></span>
                <span id="typer-text"></span>
                <input type="text" id="cmd-input" autofocus spellcheck="false">
                <div id="cursor"></div>
            </div>
        </div>
    </div>

    <div id="connection-log" class="connection-log-overlay"></div>

    <script type="module" src="./modules/date.js"></script>
    <script type="module" src="./modules/Download.js"></script>
    <script type="module" src="./modules/Readlog.js"></script>
    <script type="module" src="./app/script.js"></script>
    <script type="module" src="./modules/files.js"></script>
    <script type="module" src="./modules/progress.js"></script>
    <script type="module" src="./modules/TGbot.js"></script>
    <script type="module" src="./modules/three-bg.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <audio id="player-audio" src=""></audio>
</body>
</html>
